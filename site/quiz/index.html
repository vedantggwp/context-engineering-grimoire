<script>window.QUIZ_CARDS = [{"front":"Summarize Context Engineering Templates in your own words.","back":"Context engineering as a discipline has open-source templates that turn the idea into a repeatable workflow. This article covers two of them. coleam00's Context Engineering Template is \"A comprehensive template for getting started with Context Engineering - the discipline of engineering context for AI coding assistants so they have the information necessary to get the job done end to end."},{"front":"What are the key capabilities of Context Engineering Templates?","back":"PRP workflow (coleam00) — Generate and execute a \"Product Requirements Prompt,\" a \"comprehensive implementation blueprint,\" via /generate-prp and /execute-prp. CLAUDE. md global rules (coleam00) — A file of \"project-wide rules that the AI assistant will follow in every conversation."},{"front":"What happens step-by-step when Context Engineering Templates runs?","back":"coleam00: the PRP / CLAUDE. md / examples / INITIAL workflow The quick-start sequence is: Clone the template. \"Set up your project rules\" by editing CLAUDE."},{"front":"Describe a real-world scenario where you would use Context Engineering Templates.","back":"Example: Writing an effective INITIAL. md (coleam00) The template contrasts a weak vs. strong feature description."},{"front":"When should you NOT use Context Engineering Templates?","back":"coleam00 excludes RAG/tools for now — \"This template doesn't focus on RAG and tools with context engineering because I have a LOT more in store for that soon. \" coleam00 is coding-assistant specific — It is scoped to \"AI coding assistants\" (Claude Code slash commands, CLAUDE. md), not agents in general."},{"front":"Why was Lessons from Building Manus created and what problem does it solve?","back":"This is a field report by Yichao 'Peak' Ji on the context-engineering choices behind Manus. At the start of the project the team faced \"a key decision: should we train an end-to-end agentic model... or build an agent on top of the in-context learning abilities of frontier models?"},{"front":"What can Lessons from Building Manus do that matters most?","back":"Design Around the KV-Cache — Optimize the single metric the author would pick if forced to choose one: the KV-cache hit rate, which \"directly affects both latency and cost. \" Mask, Don't Remove — Manage a growing tool space by masking token logits instead of dynamically adding/removing tool definitions. Use the File System as Context — Treat the file system as \"the ultimate context\": unlimited, persistent, and operable by the agent as externalized memory."},{"front":"Explain how Lessons from Building Manus works.","back":"Each lesson maps to a concrete practice (names are the post's own section headings): Design Around the KV-Cache. Agent context \"grows with every step, while the output... remains relatively short\" — in Manus \"the average input-to-output token ratio is around 100:1."},{"front":"How would you apply Lessons from Building Manus in practice?","back":"Example: Reviewing a batch of resumes The post's own example for the few-shot trap: \"when using Manus to help review a batch of 20 resumes, the agent often falls into a rhythm — repeating similar actions simply because that's what it sees in the context. This leads to drift, overgeneralization, or sometimes hallucination. \" Introducing \"controlled randomness\" in formatting \"helps break the pattern and tweaks the model's attention."},{"front":"What constraints should you be aware of with Lessons from Building Manus?","back":"Not universal truth — The author is explicit: \"None of what we've shared here is universal truth — but these are the patterns that worked for us. \" Empirical, not principled — The framework was \"rebuilt four times\" via \"Stochastic Graduate Descent,\" described as \"architecture searching, prompt fiddling, and empirical guesswork\" — \"not elegant, but it works. \" Provider/framework dependent — Several practices (manual cache breakpoints, response prefill / logit masking, prefix caching via vLLM) depend on what \"model providers or inference frameworks support."},{"front":"Summarize 12-Factor Agents in your own words.","back":"12-Factor Agents is a set of principles from Dex (HumanLayer) for building \"LLM-powered software that is actually good enough to put in the hands of production customers. \" It is written \"in the spirit of 12 Factor Apps. \" The author's premise comes from having \"tried every agent framework out there\" and talking to \"a lot of really strong founders\" — most of whom \"are rolling the stack themselves."},{"front":"What are the key capabilities of 12-Factor Agents?","back":"Own your context window (Factor 3) — Rather than delegating context assembly to a framework, you control exactly what the model sees, which the guide flags as the core context-engineering factor. Compact errors into the context window (Factor 9) — Keep error information in context, compacted, so the agent can recover instead of losing the trace. Unify execution state and business state (Factor 5) — Collapse the separate notions of \"how the program is running\" and \"what the business data is\" into one representation."},{"front":"What happens step-by-step when 12-Factor Agents runs?","back":"The guide first frames agents as a loop. \"With agents you've got this loop consisting of 3 steps\": LLM determines the next step in the workflow, outputting structured json (\"tool calling\") Deterministic code executes the tool call The result is appended to the context window Repeat until the next step is determined to be \"done\" initial_event = {\"message\": \"... \"} context = [initial_event] while True: next_step = await llm."},{"front":"Describe a real-world scenario where you would use 12-Factor Agents.","back":"Example: Context-engineering factors The factors most about context engineering are the ones that govern what enters the context window and how it is shaped: Factor 3 — Own your context window: the README explicitly directs context-engineering readers here (\"Looking for Context Engineering? Jump straight to factor 3\"). Factor 9 — Compact Errors into Context Window: keep failures in context in a compacted form so the agent can adapt."},{"front":"When should you NOT use 12-Factor Agents?","back":"Not a framework — The guide is a set of principles, not a runtime. The author notes he even \"ignored all our own advice and built a framework for running distributed agents in kubernetes,\" underscoring that these are patterns to apply, not a drop-in library. The naive agent loop \"doesn't quite work\" — The guide states plainly that the \"here's your prompt, here's a bag of tools, loop until you hit the goal\" pattern \"just doesn't work as well as we want it to,\" which is the motivation for the factors rather than a solved outcome."},{"front":"Why was Evals for LLM Systems created and what problem does it solve?","back":"Evaluations (\"evals\") are a set of measurements used to assess a system's performance on a task. For any LLM-based system — and a \"system\" here can be made up of multiple components such as LLMs, prompt templates, retrieved context, and parameters like temperature — evals are what tell you whether a change helped or hurt. Without them, as Eugene Yan puts it, \"we would be flying blind, or would have to visually inspect LLM outputs with each change."},{"front":"What can Evals for LLM Systems do that matters most?","back":"Measure performance and catch regressions — a representative eval set lets you measure system changes at scale instead of eyeballing outputs each time. Guide iteration — task-specific evals guide prompt engineering, model selection, and fine-tuning; Yan calls this Eval Driven Development (EDD). Unlock debugging and fine-tuning — Hamel notes the infrastructure for evaluation (a searchable trace database, assertions, curated data) is nearly the same infrastructure you need for debugging and for generating fine-tuning data."},{"front":"Explain how Evals for LLM Systems works.","back":"Hamel's three levels of evaluation Hamel organizes evaluation into three levels, ordered by cost (Level 3 > Level 2 > Level 1), which dictates how often you run each: Level 1 — Unit tests. Assertions, like you'd write in pytest, that run fast and cheaply on every code change. You scope them by breaking your LLM's surface into features and scenarios."},{"front":"How would you apply Evals for LLM Systems in practice?","back":"Example: Eval Driven Development for a context change You tweak the retrieved-context assembly in a RAG pipeline. Rather than eyeballing a few outputs, run your Level 1 assertion suite on every change (fast, cheap), then periodically run Level 2 human/model eval on logged traces to catch quality issues assertions miss. Track results over time — Rechat visualizes test results in Metabase to see an error's prevalence before vs."},{"front":"What constraints should you be aware of with Evals for LLM Systems?","back":"Metrics can mislead — classical metrics (BLEU, ROUGE) correlate poorly with human judgment and don't fit open-ended tasks; benchmark scores aren't comparable unless the implementation is identical down to prompts and tokenization. LLM judges are biased — position, verbosity, and self-enhancement biases require explicit mitigation, and agreement-as-a-metric is misleading under class imbalance (use precision and recall). Human eval doesn't fully go away — Hamel: \"You are doing it wrong if you aren't looking at lots of data\"; you can sample more over time but never stop entirely."},{"front":"Summarize How Contexts Fail: Four Failure Modes in your own words.","back":"As frontier model context windows have grown — many now supporting up to 1 million tokens — a tempting assumption spread: with a large enough window, you can simply throw everything a model might need into a prompt (tools, documents, instructions) and let the model sort it out. Long contexts kneecapped RAG enthusiasm, enabled MCP hype, and fueled enthusiasm for agents. But in reality, longer contexts do not generate better responses."},{"front":"What are the key capabilities of How Contexts Fail: Four Failure Modes?","back":"Context Poisoning — a hallucination or error makes it into the context, where it is repeatedly referenced, causing the model to fixate on impossible or irrelevant goals. Context Distraction — a context grows so long the model over-focuses on it, neglecting what it learned during training and repeating past actions rather than synthesizing new plans. Context Confusion — superfluous content in the context is used by the model to generate a low-quality response, such as calling irrelevant tools."},{"front":"What happens step-by-step when How Contexts Fail: Four Failure Modes runs?","back":"Context Poisoning Context Poisoning is when a hallucination or other error makes it into the context, where it is repeatedly referenced. The DeepMind team called this out in the Gemini 2. 5 technical report, describing the Gemini agent playing Pokémon."},{"front":"Describe a real-world scenario where you would use How Contexts Fail: Four Failure Modes.","back":"Example: Diagnosing a fixated agent An agent keeps pursuing a goal that can't be achieved and repeats the same behaviors. Check whether an earlier hallucination entered a persistent part of the context (a goals or summary section). This is Context Poisoning — the error is being re-referenced every turn, so it must be removed from the context, not merely argued against."},{"front":"When should you NOT use How Contexts Fail: Four Failure Modes?","back":"The article names the failure modes but defers fixes — Breunig states solutions (dynamically loading tools, spinning up context quarantines) are covered in a follow-up post, \"How to Fix Your Context. \" This article is diagnostic, not prescriptive. Some evidence is anecdotal — the Gemini Pokémon observations are described in the source as anecdotal, and the distraction ceiling varies by model, so specific thresholds shouldn't be treated as universal constants."},{"front":"Why was Lost in the Middle: How Models Use Long Contexts created and what problem does it solve?","back":"Language models can accept long contexts as input, but relatively little was known about how well they actually use longer context. Liu et al. (Stanford, UC Berkeley, Samaya AI) analyze model performance on two tasks that require identifying relevant information within the input context: multi-document question answering and synthetic key-value retrieval."},{"front":"What can Lost in the Middle: How Models Use Long Contexts do that matters most?","back":"Establishes the U-shaped position effect — models retrieve and use information at the very start or very end of their input far better than information in the middle. Shows degradation with length — averaged across positions, performance steadily decreases as the input context grows longer, on both tasks. Shows extended-context models aren't necessarily better — a model and its extended-context counterpart perform nearly identically when the input fits in both windows."},{"front":"Explain how Lost in the Middle: How Models Use Long Contexts works.","back":"The authors run controlled experiments, varying two things independently: the length of the input context and the position of the relevant information within it. Multi-document QA. The model receives a question and k documents (Wikipedia passages), where exactly one document contains the answer and k−1 are \"distractor\" documents that do not."},{"front":"How would you apply Lost in the Middle: How Models Use Long Contexts in practice?","back":"Example: Reranking retrieved documents Because models use information best at the start or end, the paper suggests effective reranking of retrieved documents — pushing the most relevant content closer to the start of the input context — as a promising direction for improving retriever-reader systems. Don't assume a relevant document buried in the middle of many retrieved passages will be used. Example: Truncating the retrieved list Since reader performance saturates long before retriever recall (more than 20 documents barely helped), returning fewer documents when appropriate (ranked-list truncation) can preserve accuracy while cutting the input length, latency, and cost."},{"front":"What constraints should you be aware of with Lost in the Middle: How Models Use Long Contexts?","back":"The \"why\" investigations are preliminary — the architecture, query-aware contextualization, and instruction-tuning analyses are explicitly framed as preliminary, not definitive causal explanations. Task-specific findings — results come from multi-document QA and synthetic key-value retrieval; the open-domain QA case study notes the marginal value of added context is downstream-task-specific. Point-in-time models — the study evaluates 2023-era models (GPT-3."},{"front":"Summarize Context Engineering vs. Prompt Engineering in your own words.","back":"\"Context engineering\" is gaining traction as a broader successor to \"prompt engineering. \" Where prompt engineering focuses on crafting the perfect set of instructions in a single text string, context engineering asks the broader question of what configuration of context — across system instructions, tools, message history, external data, and memory — is most likely to produce the desired behavior. Anthropic states its position directly: \"we view context engineering as the natural progression of prompt engineering."},{"front":"What are the key capabilities of Context Engineering vs. Prompt Engineering?","back":"Broader unit of design — Per Schmid, prompt engineering focuses on \"crafting the perfect set of instructions in a single text string,\" while context engineering is \"far broader,\" designing dynamic systems that assemble information and tools. A subset relationship — Anthropic defines prompt engineering as \"methods for writing and organizing LLM instructions for optimal outcomes\" and context engineering as \"the set of strategies for curating and maintaining the optimal set of tokens (information) during LLM inference, including all the other information that may land there outside of the prompts. \" Iterative vs."},{"front":"What happens step-by-step when Context Engineering vs. Prompt Engineering runs?","back":"Anthropic's framing of the shift Anthropic traces the transition to a change in what AI engineering actually involves: The prompt-era baseline — \"In the early days of engineering with LLMs, prompting was the biggest component of AI engineering work,\" because most use cases outside everyday chat needed prompts optimized for one-shot classification or text generation. The primary focus was how to write effective prompts, particularly system prompts. The move to agents — \"As we move towards engineering more capable agents that operate over multiple turns of inference and longer time horizons, we need strategies for managing the entire context state (system instructions, tools, Model Context Protocol (MCP), external data, message history, etc)."},{"front":"Describe a real-world scenario where you would use Context Engineering vs. Prompt Engineering.","back":"Example: When prompt engineering is enough For everyday chat interactions and one-shot tasks — classification, a single text generation — the prompt is nearly the whole job. Anthropic notes these \"required prompts optimized for one-shot classification or text generation tasks,\" where writing an effective system prompt is the dominant concern. Here, prompt engineering and context engineering largely coincide."},{"front":"When should you NOT use Context Engineering vs. Prompt Engineering?","back":"Not a replacement, a superset — The sources treat prompt engineering as a still-valid component, not a discarded practice. Anthropic calls context engineering the \"natural progression\" of prompt engineering, and prompt quality (especially the system prompt) remains part of the work. Terminology is still settling — Willison presents the sticking power of \"context engineering\" as a prediction (\"I think this one may have sticking power\"), grounded in how inferred definitions spread, not as a settled fact."},{"front":"Summarize The Context Window as Working Memory in your own words.","back":"A useful mental model for context engineering treats the LLM's context window as its working memory. Lance Martin relays Andrej Karpathy's framing: \"LLMs are like a new kind of operating system. The LLM is like the CPU and its context window is like the RAM, serving as the model's working memory."},{"front":"What are the key capabilities of The Context Window as Working Memory?","back":"A unifying analogy — The OS/RAM framing (Martin, via Karpathy) gives engineers an intuitive model: the context window is scarce, shared working memory that must be actively managed, not an unlimited scratch space. A basis for memory hierarchy — The survey classifies memory temporally into sensory memory (input prompts), short-term memory (immediate context processing), and long-term memory (external databases or dedicated structures), with short-term memory being the context window itself. A driver for curation strategy — Because working memory is finite, agents must decide at each step what to keep in context, motivating the write / select / compress / isolate strategies Martin catalogs."},{"front":"What happens step-by-step when The Context Window as Working Memory runs?","back":"The operating-system analogy Martin lays out the mapping directly (crediting Karpathy): LLM ≈ CPU — the model is the processing unit. Context window ≈ RAM — the context window is the model's working memory, holding what the model can act on right now. Context engineering ≈ the OS's memory management — \"just as an operating system curates what fits into a CPU's RAM, 'context engineering' plays a similar role."},{"front":"Describe a real-world scenario where you would use The Context Window as Working Memory.","back":"Example: Persisting a plan outside working memory Because the context window is limited RAM, agents offload important information to external storage. Martin cites Anthropic's multi-agent researcher: \"The LeadResearcher begins by thinking through the approach and saving its plan to Memory to persist the context, since if the context window exceeds 200,000 tokens it will be truncated and it is important to retain the plan. \" The plan is written outside working memory precisely because working memory will be overrun."},{"front":"When should you NOT use The Context Window as Working Memory?","back":"The analogy is a model, not a mechanism — Martin presents OS/RAM as an intuition pump. The survey shows the underlying reality is messier: attention is quadratic in sequence length, and capacity limits interact with positional biases like lost-in-the-middle rather than behaving like clean byte-addressable RAM. Bigger windows don't remove the constraint — Per the survey, extending context windows to millions of tokens still leaves models struggling to reason over extended contexts, especially when relevant information sits in the middle, so curation remains necessary even as capacity grows."},{"front":"Why was What Is Context Engineering created and what problem does it solve?","back":"Context engineering is the emerging discipline of curating everything an LLM sees before it generates a response, so that a task becomes \"plausibly solvable by the LLM. \" Shopify CEO Tobi Lütke framed the term as \"the art of providing all the context for the task to be plausibly solvable by the LLM,\" and Andrej Karpathy amplified it, describing it as the \"delicate art and science of filling the context window with just the right information for the next step\" (per Simon Willison's and Philipp Schmid's write-ups). The shift matters most for agents."},{"front":"What can What Is Context Engineering do that matters most?","back":"A system, not a string — Per Schmid, context is not a static prompt template but the output of a system that runs before the main LLM call, assembling the right inputs on the fly. Dynamic and task-tailored — Context is created on the fly for the immediate task: calendar data for one request, emails or a web search for another (Schmid). Right information and tools, right format, right time — The core job is to ensure the model isn't missing crucial details (\"Garbage In, Garbage Out\"), providing both knowledge and capabilities only when needed, and in a digestible format — a concise summary beats a raw data dump, a clear tool schema beats a vague instruction (Schmid)."},{"front":"Explain how What Is Context Engineering works.","back":"The anatomy of context Context is \"everything the model sees before it generates a response\" (Schmid). Schmid decomposes it into these components: Instructions / System Prompt — initial instructions defining model behavior; can include examples and rules. User Prompt — the immediate task or question from the user."},{"front":"How would you apply What Is Context Engineering in practice?","back":"Example: The scheduling assistant (cheap demo vs. magical agent) Schmid illustrates the payoff with an assistant asked to reply to: \"Hey, just checking if you're around for a quick sync tomorrow. \" A \"cheap demo\" agent sees only the user's request."},{"front":"What constraints should you be aware of with What Is Context Engineering?","back":"Runtime exploration is slower — Anthropic notes that just-in-time retrieval trades speed for flexibility: exploring at runtime is slower than retrieving pre-computed data, and without proper guidance an agent can waste context by misusing tools or chasing dead-ends. Attention is a finite budget — Per Anthropic, LLMs have an \"attention budget\" that every new token depletes; context must be treated as a finite resource with diminishing marginal returns, so more context is not automatically better. Format and curation are hard — Schmid stresses that how information is presented matters (concise summary over raw dump), and Anthropic notes bloated tool sets and over-stuffed examples actively degrade performance."},{"front":"Why was Agentic Context Engineering (ACE): Contexts as Evolving Playbooks created and what problem does it solve?","back":"Agentic Context Engineering (ACE) is a framework, introduced by Qizheng Zhang and colleagues (Stanford / SambaNova, ICLR 2026), for improving an LLM system by adapting its context rather than its weights. Where the rest of this wiki's strategies/four-context-strategies treat context as something you assemble fresh each turn, ACE treats it as a durable, growing artifact — an \"evolving playbook\" that accumulates and organizes strategies over time and gets better as the agent runs. The paper frames itself against a real failure of naive context adaptation."},{"front":"What can Agentic Context Engineering (ACE): Contexts as Evolving Playbooks do that matters most?","back":"Self-improvement without labels — ACE adapts by leveraging natural execution feedback (what worked, what failed when the agent ran), so it does not require labeled supervision to improve. Offline and online adaptation — the same mechanism optimizes context both offline (e. g."},{"front":"Explain how Agentic Context Engineering (ACE): Contexts as Evolving Playbooks works.","back":"ACE organizes context adaptation as a modular loop of three roles — generation, reflection, and curation: Generate — the agent (a Generator LLM) produces reasoning trajectories while attempting tasks, exercising the current playbook. Reflect — a Reflector analyzes those trajectories, distinguishing what contributed to success from what led to failure, and distills the lesson. Curate — a Curator folds the distilled insight back into the playbook as a structured, incremental update, so detail accumulates rather than being overwritten."},{"front":"How would you apply Agentic Context Engineering (ACE): Contexts as Evolving Playbooks in practice?","back":"Example: Optimizing a system prompt offline Run the agent over a benchmark or a batch of representative tasks, let the Reflector mine the failures, and let the Curator compile the lessons into an improved system prompt — an automated alternative to hand-tuning instructions. Example: Online agent memory During a long-horizon task, treat the accumulating playbook as the agent's working memory: each completed sub-task feeds execution feedback back into the context, so later steps benefit from what earlier steps learned. On the AppWorld leaderboard, the abstract reports ACE matching the top production agent on the overall average — and surpassing it on the harder test-challenge split — despite using a smaller open-source model."},{"front":"What should you know about Reported Results in Agentic Context Engineering (ACE): Contexts as Evolving Playbooks?","back":"+10. 6% on agent benchmarks and +8. 6% on finance (domain-specific reasoning) over strong baselines."},{"front":"What constraints should you be aware of with Agentic Context Engineering (ACE): Contexts as Evolving Playbooks?","back":"Not a free lunch on simple tasks — the machinery (Generator / Reflector / Curator) is aimed at agents and domain reasoning where context accumulates; for one-shot prompts there is little playbook to evolve. Feedback quality bounds it — ACE learns from execution feedback, so it is only as good as the signal the environment returns. Sparse or misleading feedback limits what the Reflector can distill."},{"front":"What is Agentic Search and Just-in-Time Retrieval and why does it matter?","back":"A central design question in context engineering is when an agent fetches its data: pre-load everything up front, or retrieve on demand as the task unfolds. Anthropic frames a shift in how engineers think about designing context for agents. Many AI-native applications employ embedding-based, pre-inference-time retrieval to surface important context."},{"front":"List the most important features of Agentic Search and Just-in-Time Retrieval.","back":"Just-in-time retrieval — Load data at runtime via lightweight references rather than pre-computing and pre-loading everything. Agentic search — Let the model autonomously use tools in a loop to navigate and retrieve data, recovering from errors as models become more capable. Progressive disclosure — Incrementally discover relevant context through exploration, where each interaction yields signals that inform the next decision."},{"front":"Walk through the main mechanism of Agentic Search and Just-in-Time Retrieval.","back":"Just-in-time context (Anthropic) Anthropic defines agents, following Simon Willison, as \"LLMs autonomously using tools in a loop. \" As underlying models get more capable, agent autonomy can scale — smarter models can independently navigate nuanced problem spaces and recover from errors. In the just-in-time approach, the agent holds lightweight identifiers and loads data at runtime: Maintain references, not payloads — file paths, stored queries, web links."},{"front":"Give an example of using Agentic Search and Just-in-Time Retrieval.","back":"Example: Analyzing a large database without loading it (just-in-time) An agent must analyze a database far larger than its context window. hold a reference (query / file path), not the data → write a targeted query, store results → use head / tail (Bash) to inspect large volumes → never load full data objects into context Example: Hybrid retrieval in a coding agent An agent needs both stable project conventions and fresh, current file contents. up front: drop CLAUDE."},{"front":"What are the trade-offs or limitations of Agentic Search and Just-in-Time Retrieval?","back":"Runtime exploration is slower — Just-in-time retrieval trades speed for freshness; pre-computed retrieval is faster when data is static. Requires opinionated engineering — Without the right tools and heuristics, an agent wastes context misusing tools, chasing dead-ends, or missing key information. Embedding search degrades at scale — As a codebase grows, embedding search becomes an unreliable retrieval heuristic; production systems must combine grep/file search, knowledge-graph retrieval, and re-ranking."},{"front":"Summarize Context Compression Optimization (ACON) for Long-Horizon Agents in your own words.","back":"Agent Context Optimization (ACON) is a compression framework from Minki Kang and colleagues (Microsoft, ICML 2026) for long-horizon agents — agents that run many steps and accumulate an ever-growing record of actions and observations. Unbounded context growth creates two bottlenecks the paper names directly: prohibitive inference-memory cost and reasoning degradation as relevant signal drowns in irrelevant history (a concrete instance of the failure-modes/how-contexts-fail \"distraction\" mode). ACON is the \"compress\" bucket of the strategies/four-context-strategies done rigorously: instead of a brittle summarization heuristic, it optimizes how it compresses, and instead of fine-tuning the model, it optimizes in natural language."},{"front":"What are the key capabilities of Context Compression Optimization (ACON) for Long-Horizon Agents?","back":"Compresses both observations and history — a unified framework for the two things that balloon in agentic runs: environment observations (tool outputs, pages, results) and the interaction history itself. No fine-tuning required — optimization happens in natural-language space, so ACON works with closed-source and large-scale LLMs that cannot be retrained. Failure-driven guideline optimization — the compression rule is not fixed; it is refined by analyzing cases where compression caused the agent to fail."},{"front":"What happens step-by-step when Context Compression Optimization (ACON) for Long-Horizon Agents runs?","back":"The distinctive idea is compression guideline optimization in natural-language space, driven by failure analysis: Pair trajectories — collect cases where the agent succeeds with full context but fails with the compressed context. That gap localizes what the compressor wrongly discarded. Analyze the failure — a capable LLM reads the paired trajectories and diagnoses why the compressed context lost critical state."},{"front":"Describe a real-world scenario where you would use Context Compression Optimization (ACON) for Long-Horizon Agents.","back":"Example: Taming observation bloat in a tool-using agent An agent that scrapes pages or calls verbose APIs accumulates huge observations. ACON compresses each observation as it lands, keeping the state the agent will actually need — refining what \"need\" means whenever aggressive compression later causes a failure. Example: Letting a small model run long-horizon tasks Because compression mitigates context distraction, ACON lets smaller LMs stay coherent over long runs."},{"front":"What should you know about Reported Results in Context Compression Optimization (ACON) for Long-Horizon Agents?","back":"26–54% reduction in peak token usage across three benchmarks. Up to 46% performance improvement for smaller models via reduced distraction. The optimized compressor is distilled into smaller models to cut compression overhead; the abstract does not quantify how much performance the distilled compressor retains."},{"front":"When should you NOT use Context Compression Optimization (ACON) for Long-Horizon Agents?","back":"Needs a failure signal to optimize against — guideline optimization depends on observing compressed-context failures; a task with no clear success/failure signal gives the optimizer little to learn from. Compression can still drop the wrong thing — the method reduces, but does not eliminate, the risk that a compressed observation omits information a later step needs; the optimization loop is the mitigation, not a guarantee. Extract-fidelity coverage — this article is grounded in the abstract; exact guideline formats, prompts, and per-benchmark numbers require the full paper."},{"front":"Summarize Context Management Tactics: Six Ways to Fix Your Context in your own words.","back":"Drew Breunig's \"How to Fix Your Context\" is the practical companion to his earlier catalog of how long contexts fail. Where the first post named the failure modes — Context Poisoning (a hallucination or error makes it into the context and is repeatedly referenced), Context Distraction (a context grows so long the model over-focuses on it, neglecting training), Context Confusion (superfluous information is used to generate a low-quality response), and Context Clash (new information and tools conflict with other content in the prompt) — this post lays out the fixes. The unifying theme is information management: \"Everything in the context influences the response."},{"front":"What are the key capabilities of Context Management Tactics: Six Ways to Fix Your Context?","back":"RAG — Selectively adding only relevant information to help the LLM generate a better response. Tool Loadout — Selecting only the relevant tool definitions to add to your context. Context Quarantine — Isolating contexts in their own dedicated threads, each used separately by one or more LLMs."},{"front":"What happens step-by-step when Context Management Tactics: Six Ways to Fix Your Context runs?","back":"RAG Retrieval-Augmented Generation is the act of selectively adding relevant information to help the LLM generate a better response. Breunig notes it's \"very much alive\": every time a model raises the context-window ante (the last big event being Llama 4 Scout's 10-million-token window), a \"RAG is Dead\" debate is born. But if you treat your context like a junk drawer, the junk will influence your response."},{"front":"Describe a real-world scenario where you would use Context Management Tactics: Six Ways to Fix Your Context.","back":"Example: Curating a tool loadout past the 30-tool cliff An agent with a large, growing set of integrations starts calling the wrong tools because descriptions overlap. store tool descriptions in a vector DB → RAG-select &#x3C; 30 tools relevant to the input prompt → shorter prompts, up to 3x better tool selection accuracy Example: Offloading with a scratchpad on a long tool chain An agent performing a long chain of tool calls loses track of intermediate findings."},{"front":"When should you NOT use Context Management Tactics: Six Ways to Fix Your Context?","back":"Quarantine doesn't fit shared-context problems — Tasks that require context-sharing among multiple agents \"aren't particularly suited to this tactic. \" Summarization is hard to perfect — Knowing what to preserve versus discard is critical and agent-specific; done poorly it drops important events or decisions. Pruning and summarization need structure — Getting reliable results argues for maintaining a structured version of your context rather than an opaque string."},{"front":"Summarize The Four Context Strategies: Write, Select, Compress, Isolate in your own words.","back":"Agents need context to perform tasks. LangChain defines context engineering as \"the art and science of filling the context window with just the right information at each step of an agent's trajectory. \" Because agents interleave LLM calls and tool calls — often for long-running tasks — they accumulate feedback over many turns and can use a large number of tokens."},{"front":"What are the key capabilities of The Four Context Strategies: Write, Select, Compress, Isolate?","back":"Write context — saving information outside the context window (scratchpads, memories) so it persists and is available to the agent later. Select context — pulling the right information into the context window at each step (from scratchpads, memories, tools, and knowledge via RAG). Compress context — retaining only the tokens required to perform a task, via summarization or trimming."},{"front":"What happens step-by-step when The Four Context Strategies: Write, Select, Compress, Isolate runs?","back":"The four strategies address the same underlying problem — a finite context window filling with accumulated tool feedback — from four different angles. 1. Write Context Writing context means saving it outside the context window to help an agent perform a task."},{"front":"Describe a real-world scenario where you would use The Four Context Strategies: Write, Select, Compress, Isolate.","back":"Example: Persisting a plan with a scratchpad (Write) An agent facing a long-running research task risks losing its plan when the context window is truncated. LeadResearcher: think through approach → save plan to Memory (context window may exceed 200,000 tokens and truncate; the persisted plan survives) Example: Trimming tools with RAG (Select) An agent equipped with a large tool library keeps picking the wrong tool because descriptions overlap."},{"front":"When should you NOT use The Four Context Strategies: Write, Select, Compress, Isolate?","back":"Memory selection is hard — Pulling the right memory from a large collection is unreliable; undesired retrieval (like ChatGPT injecting a location into an image) erodes user trust in the context window. Summarization can lose critical detail — If specific events or decisions must be captured, summarization may drop them; Cognition found this required a fine-tuned model. Multi-agent isolation is expensive — It can consume up to 15× more tokens than chat and demands careful prompt engineering and coordination of sub-agents."}];</script>
<div class="quiz-wrap">
  <div class="quiz-progress">
    <div class="quiz-progress-fill" id="quiz-progress-fill"></div>
  </div>
  <div class="quiz-meta">
    <span class="quiz-counter" id="quiz-progress"></span>
    <span class="quiz-streak" id="quiz-streak" hidden>&#128293; <span id="quiz-streak-n">0</span></span>
    <span class="quiz-score" id="quiz-score"></span>
  </div>
  <div class="quiz-card3d" id="quiz-card3d">
    <article class="quiz-card quiz-face quiz-face--front" id="quiz-card" aria-live="polite">
      <div class="quiz-label">Question</div>
      <p class="quiz-question" id="quiz-question"></p>
    </article>
    <article class="quiz-card quiz-face quiz-face--back" id="quiz-card-back" aria-hidden="true">
      <div class="quiz-label">Answer</div>
      <div class="quiz-answer" id="quiz-answer"></div>
    </article>
    <div class="quiz-burst" id="quiz-burst" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <div class="quiz-actions">
    <button class="quiz-btn quiz-btn--primary" id="btn-show">Show answer</button>
    <div class="quiz-feedback" id="quiz-feedback">
      <button class="quiz-btn quiz-btn--got-it" id="btn-got-it">Got it</button>
      <button class="quiz-btn quiz-btn--review" id="btn-review">Review again</button>
    </div>
    <button class="quiz-btn quiz-btn--primary" id="btn-restart" style="display:none">Restart</button>
  </div>
</div>
<script>
(function() {
  var cards = window.QUIZ_CARDS;
  var deck = [];
  var current = 0;
  var gotIt = 0;
  var reviewAgain = 0;
  var revealed = false;

  var cardEl = document.getElementById('quiz-card');
  var card3d = document.getElementById('quiz-card3d');
  var backEl = document.getElementById('quiz-card-back');
  var questionEl = document.getElementById('quiz-question');
  var answerEl = document.getElementById('quiz-answer');
  var showBtn = document.getElementById('btn-show');
  var gotItBtn = document.getElementById('btn-got-it');
  var reviewBtn = document.getElementById('btn-review');
  var restartBtn = document.getElementById('btn-restart');
  var feedbackRow = document.getElementById('quiz-feedback');
  var scoreEl = document.getElementById('quiz-score');
  var progressEl = document.getElementById('quiz-progress');
  var progressFill = document.getElementById('quiz-progress-fill');
  var streakEl = document.getElementById('quiz-streak');
  var streakNEl = document.getElementById('quiz-streak-n');
  var burstEl = document.getElementById('quiz-burst');
  var streak = 0;

  function updateStreak() {
    if (!streakEl || !streakNEl) return;
    streakNEl.textContent = String(streak);
    streakEl.hidden = streak < 3;
    if (streak === 3 || streak === 5 || streak === 10) {
      streakEl.classList.remove('pulsing');
      void streakEl.offsetWidth; // restart the pulse animation
      streakEl.classList.add('pulsing');
      if (burstEl && window.GRIMOIRE_MOTION_OK && window.GRIMOIRE_MOTION_OK()) {
        burstEl.classList.remove('bursting');
        void burstEl.offsetWidth;
        burstEl.classList.add('bursting');
      }
    }
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function hide(el) { if (el) el.style.display = 'none'; }
  function show(el, display) { if (el) el.style.display = display || ''; }

  function start() {
    deck = shuffle(cards);
    current = 0;
    gotIt = 0;
    reviewAgain = 0;
    revealed = false;
    render();
  }

  function render() {
    if (current >= deck.length) {
      hide(card3d);
      hide(showBtn);
      hide(feedbackRow);
      show(restartBtn, 'inline-flex');
      progressEl.textContent = 'Complete';
      scoreEl.textContent = gotIt + ' got it · ' + reviewAgain + ' to review · ' + deck.length + ' total';
      progressFill.style.width = '100%';
      return;
    }

    show(card3d);
    show(showBtn, 'inline-flex');
    hide(feedbackRow);
    hide(restartBtn);
    revealed = false;

    // Reset the flip without animating backwards, then slide the new card in.
    card3d.classList.add('no-flip-transition');
    card3d.classList.remove('flipped');
    void card3d.offsetWidth;
    card3d.classList.remove('no-flip-transition');
    card3d.classList.remove('entering');
    void card3d.offsetWidth;
    card3d.classList.add('entering');
    if (backEl) backEl.setAttribute('aria-hidden', 'true');

    questionEl.textContent = deck[current].front;
    answerEl.textContent = deck[current].back;
    answerEl.classList.remove('revealed');

    progressEl.textContent = (current + 1) + ' / ' + deck.length;
    scoreEl.textContent = gotIt + ' got it · ' + reviewAgain + ' to review';
    progressFill.style.width = ((current + 1) / deck.length * 100) + '%';
  }

  function reveal() {
    if (revealed) return;
    revealed = true;
    answerEl.classList.add('revealed');
    card3d.classList.add('flipped');
    if (backEl) backEl.setAttribute('aria-hidden', 'false');
    hide(showBtn);
    show(feedbackRow, 'flex');
  }

  showBtn.addEventListener('click', reveal);
  // Pressing Space or Enter while the card has focus reveals the answer
  cardEl.setAttribute('tabindex', '0');
  cardEl.addEventListener('keydown', function(e) {
    if ((e.key === ' ' || e.key === 'Enter') && !revealed) {
      e.preventDefault();
      reveal();
    }
  });

  gotItBtn.addEventListener('click', function() {
    gotIt++;
    streak++;
    updateStreak();
    current++;
    render();
  });

  reviewBtn.addEventListener('click', function() {
    reviewAgain++;
    streak = 0;
    updateStreak();
    current++;
    render();
  });

  restartBtn.addEventListener('click', function() {
    streak = 0;
    updateStreak();
    start();
  });

  if (!cards || cards.length === 0) {
    hide(card3d);
    hide(showBtn);
    hide(feedbackRow);
    progressEl.textContent = '';
    scoreEl.textContent = 'No flashcards yet — articles need H2 sections with prose content.';
  } else {
    start();
  }
})();
</script>
</main>

<script>
(function() {
  var KEY = 'grimoire-theme';
  var toggle = document.getElementById('theme-toggle');
  var icon = document.getElementById('theme-icon');
  var root = document.documentElement;

  function getStored() {
    try { return localStorage.getItem(KEY); } catch(e) { return null; }
  }

  function apply(theme) {
    root.classList.remove('theme-light', 'theme-dark');
    if (theme) root.classList.add('theme-' + theme);
    icon.textContent = theme === 'dark' ? '\u2600' : '\u263E';
    try { localStorage.setItem(KEY, theme || ''); } catch(e) {}
  }

  var stored = getStored();
  if (stored) apply(stored);

  toggle.addEventListener('click', function() {
    var isDark = root.classList.contains('theme-dark') ||
      (!root.classList.contains('theme-light') &&
       window.matchMedia('(prefers-color-scheme: dark)').matches);
    apply(isDark ? 'light' : 'dark');
  });
})();
</script>
